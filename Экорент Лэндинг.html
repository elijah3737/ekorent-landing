 }}\"><button onclick=\"{{ tab.onClick }}\" style=\"border:1px solid rgba(10,11,13,0.12);background:#fff;color:#0A0B0D;border-radius:999px;padding:12px 22px;font-family:Manrope;font-weight:700;font-size:15px;cursor:pointer;transition:border-color .15s ease\" style-hover=\"border-color:#00E05B\">{{ tab.label }}<\/button><\/sc-if>\n        <\/sc-for>\n      <\/div>\n\n      <div data-reveal=\"\" style=\"opacity:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:24px\">\n        <sc-for list=\"{{ visibleCars }}\" as=\"car\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid rgba(10,11,13,0.07);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(0,0,0,0.04);transition:transform .22s ease,box-shadow .25s ease\" style-hover=\"transform:translateY(-6px);box-shadow:0 22px 44px rgba(0,0,0,0.1)\">\n            <div style=\"position:relative;background:linear-gradient(135deg,#EEF1F0,#F8FAF9);padding:18px\">\n              <span style=\"position:absolute;top:16px;left:16px;z-index:2;background:rgba(255,255,255,0.85);backdrop-filter:blur(6px);border:1px solid rgba(10,11,13,0.06);border-radius:999px;padding:5px 11px;font-size:11px;font-weight:700;color:#0A0B0D\">{{ car.clsLabel }}<\/span>\n              <div role=\"img\" aria-label=\"{{ car.brand }} {{ car.model }}\" style=\"width:100%;height:184px;background:#EEF1F0 center/cover no-repeat;background-image:url('{{ car.img }}');border-radius:14px\"><\/div>\n            <\/div>\n            <div style=\"padding:20px 20px 22px;display:flex;flex-direction:column;gap:16px;flex:1\">\n              <div style=\"display:flex;align-items:baseline;gap:7px\">\n                <span style=\"font-family:Montserrat;font-weight:700;font-size:20px;letter-spacing:-0.01em\">{{ car.brand }}<\/span>\n                <span style=\"font-family:Montserrat;font-weight:600;font-size:20px;letter-spacing:-0.01em;color:#454B52\">{{ car.model }}<\/span>\n              <\/div>\n              <div style=\"display:flex;gap:8px\">\n                <div style=\"flex:1;display:flex;align-items:center;gap:8px;background:#F5F6F6;border-radius:13px;padding:9px 10px\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"#00A23F\"><path d=\"M13 2L4 14h7l-1 8 9-12h-7l1-8z\"><\/path><\/svg>\n                  <div style=\"display:flex;flex-direction:column;line-height:1.05\"><span style=\"font-weight:700;font-size:14px\">{{ car.range }}<\/span><span style=\"font-size:10px;color:#585D63;margin-top:2px\">км хода<\/span><\/div>\n                <\/div>\n                <div style=\"flex:1;display:flex;align-items:center;gap:8px;background:#F5F6F6;border-radius:13px;padding:9px 10px\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00A23F\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"13.5\" r=\"7.5\"><\/circle><path d=\"M12 13.5V9\"><\/path><path d=\"M9.5 2h5\"><\/path><\/svg>\n                  <div style=\"display:flex;flex-direction:column;line-height:1.05\"><span style=\"font-weight:700;font-size:14px\">{{ car.accel }}<\/span><span style=\"font-size:10px;color:#585D63;margin-top:2px\">с до 100<\/span><\/div>\n                <\/div>\n                <div style=\"flex:1;display:flex;align-items:center;gap:8px;background:#F5F6F6;border-radius:13px;padding:9px 10px\">\n                  <svg width=\"16\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00A23F\" stroke-width=\"2\"><rect x=\"2\" y=\"7\" width=\"16\" height=\"10\" rx=\"2.5\"><\/rect><path d=\"M20.5 10.5v3\" stroke-linecap=\"round\"><\/path><rect x=\"4.5\" y=\"9.5\" width=\"7\" height=\"5\" fill=\"#00A23F\" stroke=\"none\"><\/rect><\/svg>\n                  <div style=\"display:flex;flex-direction:column;line-height:1.05\"><span style=\"font-weight:700;font-size:14px\">{{ car.battery }}<\/span><span style=\"font-size:10px;color:#585D63;margin-top:2px\">кВт·ч<\/span><\/div>\n                <\/div>\n              <\/div>\n              <div style=\"margin-top:auto\">\n                <sc-if value=\"{{ showLadder }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"border-top:1px solid rgba(10,11,13,0.07);padding-top:13px\">\n                    <div style=\"font-size:11px;font-weight:700;color:#6E7378;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px\">Стоимость аренды<\/div>\n                    <sc-for list=\"{{ car.ladder }}\" as=\"tier\" hint-placeholder-count=\"4\">\n                      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px\">\n                        <span style=\"color:#585D63\">{{ tier.period }}<\/span>\n                        <span style=\"font-weight:700\">{{ tier.price }} ₽/сут<\/span>\n                      <\/div>\n                    <\/sc-for>\n                  <\/div>\n                <\/sc-if>\n                <sc-if value=\"{{ hideLadder }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border-top:1px solid rgba(10,11,13,0.07);padding-top:13px;display:flex;align-items:baseline;gap:6px\">\n                    <span style=\"font-size:13px;color:#585D63\">от<\/span>\n                    <span style=\"font-family:Montserrat;font-weight:800;font-size:24px\">{{ car.from }} ₽<\/span>\n                    <span style=\"font-size:13px;color:#585D63\">/сут<\/span>\n                  <\/div>\n                <\/sc-if>\n              <\/div>\n              <button onclick=\"{{ car.book }}\" style=\"width:100%;background:#00E05B;color:#04140B;border:none;border-radius:14px;padding:14px;font-family:Manrope;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s ease,transform .15s ease\" style-hover=\"background:#00cb50;transform:translateY(-1px)\">Забронировать<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#04140B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\/path><\/svg><\/button>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ============ НАПРАВЛЕНИЯ / АРЕНДА ДЛЯ ЛЮБЫХ ЦЕЛЕЙ ============ -->\n  <section id=\"occasions\" style=\"scroll-margin-top:88px;background:#ffffff;padding:34px 0\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:0 28px\">\n      <div data-reveal=\"\" style=\"opacity:1;max-width:640px\">\n        <h2 style=\"font-family:Montserrat;font-weight:800;font-size:clamp(32px,3.6vw,46px);line-height:1.05;letter-spacing:-0.025em;margin:12px 0 0\">Аренда для любых целей<\/h2>\n        <p style=\"font-size:17px;color:#585D63;margin:14px 0 0;line-height:1.5\">Современный электромобиль под любую задачу и любое мероприятие — от тест-драйва до свадьбы.<\/p>\n      <\/div>\n      <div data-reveal=\"\" style=\"opacity:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:14px;margin-top:28px\">\n\n        <button onclick=\"{{ openChatPlain }}\" style=\"position:relative;overflow:hidden;text-align:left;background:#fff;border:1px solid rgba(10,11,13,0.08);border-radius:24px;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:172px;cursor:pointer;font-family:Manrope;transition:transform .22s ease,box-shadow .28s ease,border-color .22s ease\" style-hover=\"transform:translateY(-6px);box-shadow:0 22px 48px rgba(0,0,0,0.10);border-color:rgba(0,224,91,0.6)\">\n          <span style=\"position:absolute;right:-34px;top:-34px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle, rgba(0,224,91,0.13), transparent 70%);pointer-events:none\"><\/span>\n          <div style=\"position:relative;width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,rgba(0,224,91,0.18),rgba(0,184,77,0.08));display:flex;align-items:center;justify-conte \n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 920 },\n  &quot;showAssistant&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;showPriceLadder&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  cars = (() => {\n    const mk = (id, brand, model, clsIndex, range, accel, battery, p, img) => ({\n      id, brand, model, clsIndex, range, accel, battery, img,\n      ladder: [\n        { period: '1–2 дня', price: p[0] },\n        { period: '3–7 дней', price: p[1] },\n        { period: '8–14 дней', price: p[2] },\n        { period: '15–30 дней', price: p[3] }\n      ],\n      from: p[3]\n    });\n    return [\n      mk(1, 'BYD', 'Seal', 0, 570, '5,9', '82', ['9 900', '8 500', '7 400', '5 900'], 'https://images.unsplash.com/photo-1711921127505-f4a8727329a5?auto=format&fit=crop&w=720&q=75'),\n      mk(2, 'Zeekr', '007', 0, 600, '5,5', '75', ['10 900', '9 200', '7 900', '6 400'], 'https://images.unsplash.com/photo-1571987502227-9231b837d92a?auto=format&fit=crop&w=720&q=75'),\n      mk(3, 'Tesla', 'Model 3', 0, 510, '6,1', '60', ['9 900', '8 400', '7 300', '5 900'], 'https://images.unsplash.com/photo-1606016159991-dfe4f2746ad5?auto=format&fit=crop&w=720&q=75'),\n      mk(4, 'Xiaomi', 'SU7', 1, 700, '5,3', '73', ['13 900', '11 900', '9 900', '7 900'], 'https://images.unsplash.com/photo-1619384557848-5d5355ec81ec?auto=format&fit=crop&w=720&q=75'),\n      mk(5, 'Tesla', 'Model 3 Performance', 1, 528, '3,1', '79', ['14 900', '12 500', '10 500', '8 400'], 'https://images.unsplash.com/photo-1560958089-b8a1929cea89?auto=format&fit=crop&w=720&q=75'),\n      mk(6, 'Zeekr', '001', 1, 620, '3,8', '100', ['13 900', '11 900', '9 900', '7 900'], 'https://images.unsplash.com/photo-1718780138801-d93eb
